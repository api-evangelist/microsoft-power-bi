aid: microsoft-power-bi
name: Microsoft Power BI
description: Microsoft Power BI is a business analytics service that delivers insights to enable fast, informed decisions.
  It provides REST APIs for accessing and managing Power BI resources including reports, dashboards, datasets, and workspaces
  programmatically.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Analytics
  - Business Intelligence
  - Dashboards
  - Microsoft
  - Reports
