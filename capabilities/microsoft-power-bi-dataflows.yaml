naftiko: 1.0.0-alpha2
info:
  label: Microsoft Power BI REST API — Dataflows
  description: 'Microsoft Power BI REST API — Dataflows. 1 operations. Lead operation: Get Dataflows. Self-contained Naftiko
    capability covering one Microsoft Power Bi business surface.'
  tags:
  - Microsoft Power Bi
  - Dataflows
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_POWER_BI_API_KEY: MICROSOFT_POWER_BI_API_KEY
capability:
  consumes:
  - type: http
    namespace: microsoft-power-bi-dataflows
    baseUri: https://api.powerbi.com/v1.0/myorg
    description: Microsoft Power BI REST API — Dataflows business capability. Self-contained, no shared references.
    resources:
    - name: dataflows
      path: /dataflows
      operations:
      - name: getdataflows
        method: GET
        description: Get Dataflows
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_POWER_BI_API_KEY}}'
  exposes:
  - type: rest
    namespace: microsoft-power-bi-dataflows-rest
    port: 8080
    description: REST adapter for Microsoft Power BI REST API — Dataflows. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/dataflows
      name: dataflows
      description: REST surface for dataflows.
      operations:
      - method: GET
        name: getdataflows
        description: Get Dataflows
        call: microsoft-power-bi-dataflows.getdataflows
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: microsoft-power-bi-dataflows-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Power BI REST API — Dataflows. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-dataflows
      description: Get Dataflows
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: microsoft-power-bi-dataflows.getdataflows
      outputParameters:
      - type: object
        mapping: $.
