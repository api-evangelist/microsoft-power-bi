naftiko: 1.0.0-alpha2
info:
  label: Microsoft Power BI REST API — Dashboards
  description: 'Microsoft Power BI REST API — Dashboards. 2 operations. Lead operation: Get Dashboards. Self-contained Naftiko
    capability covering one Microsoft Power Bi business surface.'
  tags:
  - Microsoft Power Bi
  - Dashboards
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_POWER_BI_API_KEY: MICROSOFT_POWER_BI_API_KEY
capability:
  consumes:
  - type: http
    namespace: microsoft-power-bi-dashboards
    baseUri: https://api.powerbi.com/v1.0/myorg
    description: Microsoft Power BI REST API — Dashboards business capability. Self-contained, no shared references.
    resources:
    - name: dashboards
      path: /dashboards
      operations:
      - name: getdashboards
        method: GET
        description: Get Dashboards
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dashboards-dashboardId-tiles
      path: /dashboards/{dashboardId}/tiles
      operations:
      - name: gettiles
        method: GET
        description: Get Tiles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_POWER_BI_API_KEY}}'
  exposes:
  - type: rest
    namespace: microsoft-power-bi-dashboards-rest
    port: 8080
    description: REST adapter for Microsoft Power BI REST API — Dashboards. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/dashboards
      name: dashboards
      description: REST surface for dashboards.
      operations:
      - method: GET
        name: getdashboards
        description: Get Dashboards
        call: microsoft-power-bi-dashboards.getdashboards
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dashboards/{dashboardid}/tiles
      name: dashboards-dashboardid-tiles
      description: REST surface for dashboards-dashboardId-tiles.
      operations:
      - method: GET
        name: gettiles
        description: Get Tiles
        call: microsoft-power-bi-dashboards.gettiles
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: microsoft-power-bi-dashboards-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Power BI REST API — Dashboards. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-dashboards
      description: Get Dashboards
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: microsoft-power-bi-dashboards.getdashboards
      outputParameters:
      - type: object
        mapping: $.
    - name: get-tiles
      description: Get Tiles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: microsoft-power-bi-dashboards.gettiles
      outputParameters:
      - type: object
        mapping: $.
