naftiko: 1.0.0-alpha2
info:
  label: Microsoft Power BI REST API — EmbedToken
  description: 'Microsoft Power BI REST API — EmbedToken. 1 operations. Lead operation: Generate Token. Self-contained Naftiko
    capability covering one Microsoft Power Bi business surface.'
  tags:
  - Microsoft Power Bi
  - EmbedToken
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_POWER_BI_API_KEY: MICROSOFT_POWER_BI_API_KEY
capability:
  consumes:
  - type: http
    namespace: microsoft-power-bi-embedtoken
    baseUri: https://api.powerbi.com/v1.0/myorg
    description: Microsoft Power BI REST API — EmbedToken business capability. Self-contained, no shared references.
    resources:
    - name: GenerateToken
      path: /GenerateToken
      operations:
      - name: generatetoken
        method: POST
        description: Generate Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_POWER_BI_API_KEY}}'
  exposes:
  - type: rest
    namespace: microsoft-power-bi-embedtoken-rest
    port: 8080
    description: REST adapter for Microsoft Power BI REST API — EmbedToken. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/generatetoken
      name: generatetoken
      description: REST surface for GenerateToken.
      operations:
      - method: POST
        name: generatetoken
        description: Generate Token
        call: microsoft-power-bi-embedtoken.generatetoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: microsoft-power-bi-embedtoken-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Power BI REST API — EmbedToken. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: generate-token
      description: Generate Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: microsoft-power-bi-embedtoken.generatetoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
